<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABG PRO - HỆ THỐNG ĐA CƠ QUAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; line-height: 1.6; }
        .card { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #cy { width: 100%; height: 350px; border: 1px solid #eee; margin: 20px 0; border-radius: 10px; }
        .result-text { border-left: 5px solid #dc3545; padding-left: 15px; background: #fff5f5; padding: 15px; border-radius: 5px; }
        .organ-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .organ { background: #e9ecef; padding: 10px; border-radius: 5px; font-size: 0.9rem; }
        .drug-note { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 5px; margin-top: 15px; font-weight: bold; color: #856404; }
    </style>
</head>
<body>
<div class="card">
    <h2 style="text-align: center; color: #007bff;">PHÂN TÍCH KHÍ MÁU HỆ THỐNG</h2>
    <div class="input-box">
        <input type="number" id="ph" step="0.01" placeholder="pH">
        <input type="number" id="paco2" placeholder="PaCO2">
        <input type="number" id="hco3" placeholder="HCO3-">
    </div>
    <button onclick="analyze()">PHÂN TÍCH NGAY</button>
    <div id="resArea" style="display:none;">
        <div id="cy"></div>
        <div class="result-text"><h3 id="diagTitle"></h3></div>
        <div class="organ-info" id="organArea"></div>
        <div class="drug-note" id="drugArea"></div>
    </div>
</div>
<script>
    let cy;
    window.onload = function() {
        cy = cytoscape({
            container: document.getElementById('cy'),
            style: [{ selector: 'node', style: { 'label': 'data(label)', 'text-valign': 'center', 'background-color': '#fff', 'border-width': 2, 'width': 100, 'height': 40, 'font-size': '10px' } },
                    { selector: 'edge', style: { 'width': 2, 'line-color': '#ccc', 'target-arrow-shape': 'triangle' } },
                    { selector: '.active', style: { 'background-color': '#ffc107', 'border-color': '#ffc107' } }],
            layout: { name: 'grid' }
        });
        cy.add([{ data: { id: 'a', label: 'pH' } }, { data: { id: 'b', label: 'TOAN' } }, { data: { id: 'c', label: 'KIỀM' } }]);
        cy.add([{ data: { source: 'a', target: 'b' } }, { data: { source: 'a', target: 'c' } }]);
    };
    function analyze() {
        const p = parseFloat(document.getElementById('ph').value);
        const c = parseFloat(document.getElementById('paco2').value);
        const h = parseFloat(document.getElementById('hco3').value);
        if (isNaN(p)) return;
        document.getElementById('resArea').style.display = "block";
        let diag = "", organs = "", drug = "";
        if (p < 7.35) {
            cy.getElementById('b').addClass('active');
            diag = "NHIỄM TOAN";
            organs = "<div class='organ'>🧠 <b>Não:</b> Đau đầu, lơ mơ do giãn mạch.</div><div class='organ'>🫀 <b>Tim:</b> Giảm co bóp, loạn nhịp.</div>";
            drug = "⚠️ Lưu ý: Chỉ bù Bicarbonate khi pH < 7.1. Chú ý bù Kali vì K+ sẽ hạ nhanh khi hết toan.";
        } else {
            cy.getElementById('c').addClass('active');
            diag = "NHIỄM KIỀM";
            organs = "<div class='organ'>🧠 <b>Não:</b> Co mạch não, chóng mặt.</div><div class='organ'>⚡ <b>Cơ:</b> Co quắp (hạ Canxi ảo).</div>";
            drug = "⚠️ Lưu ý: Ngưng ngay lợi tiểu Furosemide. Bù NaCl 0.9% để cung cấp Clo giúp thải kiềm.";
        }
        document.getElementById('diagTitle').innerText = diag;
        document.getElementById('organArea').innerHTML = organs;
        document.getElementById('drugArea').innerText = drug;
    }
