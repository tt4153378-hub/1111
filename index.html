<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chuyên gia ABG - Trợ Lý Khí Máu</title>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --danger: #d32f2f; --warning: #ffa000; --gray: #f1f3f4; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #e8eaed; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 450px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; color: #5f6368; margin-bottom: 6px; }
        input { width: 100%; padding: 14px; border: 2px solid #dadce0; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; }
        .btn-calc { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #resultArea { display: none; margin-top: 25px; }
        .res-box { padding: 20px; border-radius: 12px; background: #f8f9fa; border-left: 6px solid var(--primary); }
        .res-title { font-size: 1.4rem; font-weight: 800; color: var(--danger); margin-bottom: 8px; display: block; }
        .treat-box { background: #fff4e5; border: 1px solid #ffe2b3; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .footer { text-align: center; padding: 20px; font-size: 0.75rem; color: #70757a; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>Bác Sĩ Trực: Khí Máu</h1>
    </div>
    <div class="content">
        <div class="input-group">
            <label>pH (7.35 - 7.45)</label>
            <input type="number" id="ph" step="0.01" placeholder="Nhập pH...">
        </div>
        <div class="input-group">
            <label>PaCO2 (35 - 45 mmHg)</label>
            <input type="number" id="paco2" placeholder="Nhập PaCO2...">
        </div>
        <div class="input-group">
            <label>HCO3- (22 - 26 mmol/L)</label>
            <input type="number" id="hco3" placeholder="Nhập HCO3-...">
        </div>
        <button class="btn-calc" onclick="analyzeABG()">PHÂN TÍCH LÂM SÀNG</button>

        <div id="resultArea">
            <div class="res-box">
                <span id="resTitle" class="res-title"></span>
                <span id="resLogic" style="display:block; margin-bottom:10px;"></span>
                <div class="treat-box">
                    <b>🏥 Xử lý đề nghị:</b>
                    <p id="resTreat" style="margin:5px 0 0 0; font-size:0.95rem;"></p>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        © 2026 ABG Tool - Hỗ trợ học tập khoa.<br>
        <i>Nhập đủ 3 số để bắt đầu phân tích.</i>
    </div>
</div>

<script>
    function analyzeABG() {
        const ph = parseFloat(document.getElementById('ph').value);
        const paco2 = parseFloat(document.getElementById('paco2').value);
        const hco3 = parseFloat(document.getElementById('hco3').value);

        if (isNaN(ph) || isNaN(paco2) || isNaN(hco3)) {
            alert("Vui lòng nhập đủ các thông số!");
            return;
        }

        let title = "", logic = "", treat = "";
        const area = document.getElementById('resultArea');

        if (ph < 7.35) {
            if (paco2 > 45) {
                title = "TOAN HÔ HẤP";
                logic = "Do phổi không thải được CO2.";
                treat = "Hỗ trợ thông khí, hút đờm, thở máy nếu cần.";
            } else {
                title = "TOAN CHUYỂN HÓA";
                logic = "Do tích acid hoặc mất kiềm.";
                treat = "Bù dịch, tìm nguyên nhân (Sốc, Ceton). Bù Kiềm khi pH < 7.1.";
            }
        } else if (ph > 7.45) {
            if (paco2 < 35) {
                title = "KIỀM HÔ HẤP";
                logic = "Do thở quá nhanh, thải nhiều CO2.";
                treat = "Trấn an, giảm đau, cho thở chậm lại.";
            } else {
                title = "KIỀM CHUYỂN HÓA";
                logic = "Do mất acid (nôn) hoặc hạ Kali.";
                treat = "Bù dịch NaCl 0.9% và bù Kali.";
            }
        } else {
            title = "BÌNH THƯỜNG / ĐÃ BÙ";
            logic = "Chỉ số ổn định.";
            treat = "Tiếp tục theo dõi lâm sàng.";
        }

        document.getElementById('resTitle').innerText = title;
        document.getElementById('resLogic').innerText = logic;
        document.getElementById('resTreat').innerText = treat;
        area.style.display = "block";
    }
</script>
</body>
</html>
