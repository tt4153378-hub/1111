<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Viện Khí Máu - Bài Giảng Hệ Thống</title>
    <style>
        :root { --primary: #0d47a1; --danger: #b71c1c; --bg: #fdfdfd; --text: #1a202c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; margin: 0; padding: 10px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: #fff; padding: 30px; text-align: center; border-bottom: 5px solid #1565c0; }
        .content { padding: 30px; }
        .input-section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; background: #f8fafc; padding: 20px; border-radius: 12px; }
        label { display: block; font-weight: 700; font-size: 0.9rem; color: #4a5568; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; }
        .btn-analyze { width: 100%; padding: 20px; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        
        /* Sơ đồ tĩnh */
        #flow-area { display: none; margin: 30px 0; text-align: center; }
        .active-box { fill: #fffde7 !important; stroke: #fbc02d !important; stroke-width: 4px !important; }

        /* Kết quả bài giảng */
        #result-section { display: none; }
        .diag-banner { background: #fff5f5; border-left: 8px solid var(--danger); padding: 25px; margin-bottom: 30px; border-radius: 8px; }
        .organ-lecture { display: grid; grid-template-columns: 1fr; gap: 25px; }
        .lecture-card { background: #fff; border: 1px solid #edf2f7; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .lecture-card h4 { margin: 0 0 15px 0; color: var(--primary); font-size: 1.3rem; border-bottom: 2px solid #ebf4ff; padding-bottom: 10px; display: flex; align-items: center; }
        .treatment-gold { background: #fff8e1; border: 2px dashed #ffb300; padding: 30px; border-radius: 12px; margin-top: 30px; }
        .treatment-gold h3 { color: #f57c00; margin-top: 0; text-decoration: underline; }
        .theory-box { background: #e3f2fd; padding: 15px; border-radius: 8px; font-style: italic; margin-bottom: 15px; color: #0d47a1; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0">HỆ THỐNG PHÂN TÍCH & GIẢNG DẠY KHÍ MÁU</h1>
        <p style="margin:10px 0 0 0; font-weight: 300;">Dành cho Bác sĩ lâm sàng và Học viên Y khoa</p>
    </div>

    <div class="content">
        <div class="input-section">
            <div><label>pH (7.35 - 7.45)</label><input type="number" id="ph" step="0.01" placeholder="7.40"></div>
            <div><label>PaCO2 (35 - 45 mmHg)</label><input type="number" id="paco2" placeholder="40"></div>
            <div><label>HCO3- (22 - 26 mmol/L)</label><input type="number" id="hco3" placeholder="24"></div>
        </div>
        <button class="btn-analyze" onclick="runLecture()">PHÂN TÍCH & XUẤT BÀI GIẢNG</button>

        <div id="flow-area">
            <svg width="500" height="150" viewBox="0 0 500 150">
                <rect id="rect-acid" x="50" y="50" width="180" height="60" rx="10" fill="#fff" stroke="#cbd5e0" stroke-width="2"/>
                <text x="140" y="85" text-anchor="middle" font-weight="bold">TOAN (pH < 7.35)</text>
                <rect id="rect-alk" x="270" y="50" width="180" height="60" rx="10" fill="#fff" stroke="#cbd5e0" stroke-width="2"/>
                <text x="360" y="85" text-anchor="middle" font-weight="bold">KIỀM (pH > 7.45)</text>
            </svg>
        </div>

        <div id="result-section">
            <div class="diag-banner">
                <h2 id="main-diag" style="margin:0; color:var(--danger); font-size: 1.8rem;"></h2>
                <p id="sub-logic" style="margin:15px 0 0 0; font-size: 1.1rem; color: #4a5568;"></p>
            </div>

            <div class="organ-lecture" id="organ-lecture"></div>

            <div class="treatment-gold" id="treatment-gold"></div>
        </div>
    </div>
</div>

<script>
    function runLecture() {
        const ph = parseFloat(document.getElementById('ph').value);
        const co2 = parseFloat(document.getElementById('paco2').value);
        const h3 = parseFloat(document.getElementById('hco3').value);

        if (isNaN(ph) || isNaN(co2) || isNaN(h3)) return;

        document.getElementById('flow-area').style.display = "block";
        document.getElementById('result-section').style.display = "block";
        document.getElementById('rect-acid').classList.remove('active-box');
        document.getElementById('rect-alk').classList.remove('active-box');

        let title = "", logic = "", organs = "", treat = "";

        if (ph < 7.35) {
            document.getElementById('rect-acid').classList.add('active-box');
            if (co2 > 45) {
                title = "TOAN HÔ HẤP (Respiratory Acidosis)";
                logic = "Cơ chế: Giảm thông khí phế nang dẫn đến ứ đọng CO2. Theo phương trình Henderson-Hasselbalch, tăng PaCO2 làm giảm tỷ lệ [HCO3-]/PaCO2, dẫn đến nồng độ H+ tăng cao.";
                organs = renderDetailedOrgans(
                    "🧠 <b>Hệ Thần Kinh Trung Ương:</b> CO2 khuếch tán rất nhanh qua hàng rào máu não. Tại đây, nó gây giãn mạch não mạnh, làm tăng lưu lượng máu não và áp lực nội sọ. Bệnh nhân sẽ có biểu hiện 'Phù não vận mạch', đau đầu dữ dội, lơ mơ (CO2 narcosis), và run vẩy (asterixis).",
                    "🫀 <b>Hệ Tim Mạch:</b> Tình trạng toan hóa trực tiếp ức chế protein co bóp cơ tim (troponin), làm giảm sức co bóp. Đồng thời, nó gây giãn mạch ngoại vi nhưng co mạch phổi mạnh, dẫn đến tăng áp lực động mạch phổi và có thể gây suy tim phải cấp tính.",
                    "🫁 <b>Hệ Hô Hấp:</b> Phổi là cơ quan nguyên nhân nhưng cũng là nạn nhân. Áp lực CO2 cao gây mỏi cơ hoành nhanh chóng. Sự mất cân bằng thông khí/tưới máu (V/Q mismatch) làm nặng thêm tình trạng thiếu oxy máu.",
                    "🧬 <b>Thận & Nội Tiết:</b> Thận phản ứng bằng cách tăng bài tiết H+ và tái hấp thu HCO3-. Tuy nhiên, quá trình bù trừ của thận cần 24-48 giờ để đạt hiệu quả tối đa. Ở giai đoạn cấp, thận chưa kịp hỗ trợ nhiều."
                );
                treat = `<h3>💡 Phác Đồ Xử Trí & Lưu Ý Dược Lý</h3>
                        <ul>
                            <li><b>Hỗ trợ thông khí:</b> Là ưu tiên số 1. Phải đưa CO2 ra ngoài bằng máy thở (BiPAP hoặc nội khí quản).</li>
                            <li><b>Cảnh báo Bicarbonate:</b> Không được bù NaHCO3 trừ khi có toan chuyển hóa đi kèm. Bicarbonate sẽ kết hợp với H+ tạo ra CO2 và nước; lượng CO2 này không được phổi thải ra sẽ ngấm ngược vào tế bào não làm bệnh nhân hôn mê sâu hơn.</li>
                            <li><b>Dược lý bổ trợ:</b> Sử dụng thuốc giãn phế quản nếu có co thắt. Tránh dùng thuốc an thần vì làm ức chế trung tâm hô hấp.</li>
                        </ul>`;
            } else {
                title = "TOAN CHUYỂN HÓA (Metabolic Acidosis)";
                logic = "Cơ chế: Sự tích tụ các acid cố định (Lactic, Ceton) hoặc mất HCO3- quá mức qua tiêu hóa/thận. Cơ thể bù trừ bằng cách tăng thông khí phổi để giảm PaCO2.";
                organs = renderDetailedOrgans(
                    "🫀 <b>Hệ Tim Mạch:</b> Khi pH < 7.1, cơ tim trở nên trơ với các thuốc vận mạch (Catecholamine). Giãn mạch ngoại vi nặng gây sốc không hồi phục. Nguy cơ loạn nhịp thất và ngừng tim là rất lớn.",
                    "🫁 <b>Hệ Hô Hấp:</b> Kích thích các thụ thể hóa học tại xoang cảnh, gây ra kiểu thở <b>Kussmaul</b> (nhanh, sâu, gắng sức) nhằm 'rửa sạch' CO2 để nâng pH máu lên. Đây là dấu hiệu lâm sàng điển hình giúp chẩn đoán sớm.",
                    "🩸 <b>Điện Giải & Chuyển Hóa:</b> Tình trạng toan hóa làm H+ đi vào tế bào để đệm, đẩy Kali (K+) ra ngoài máu. Điều này gây tăng Kali máu giả tạo. Ngoài ra, toan chuyển hóa làm tăng phân hủy protein cơ (mệt mỏi, yếu cơ).",
                    "🦷 <b>Hệ Xương:</b> Trong toan mạn tính (như suy thận), xương phải giải phóng Canxi-Carbonate và Canxi-Phosphate để làm hệ đệm dự phòng, dẫn đến loãng xương và chậm phát triển ở trẻ em."
                );
                treat = `<h3>💡 Phác Đồ Xử Trí & Lưu Ý Dược Lý</h3>
                        <ul>
                            <li><b>Nguyên tắc vàng:</b> Điều trị nguyên nhân là then chốt (Truyền dịch trong sốc, Insulin trong DKA).</li>
                            <li><b>Quản lý Kali:</b> Cảnh báo! Khi điều trị toan, pH tăng lên sẽ kéo Kali ngược vào tế bào, gây hạ Kali máu cấp tính dẫn đến ngưng tim. <b>Luôn phải bù Kali</b> ngay khi nồng độ K+ máu về ngưỡng bình thường cao.</li>
                            <li><b>Bicarbonate:</b> Chỉ bù khi pH < 7.1 hoặc mất kiềm trực tiếp (tiêu chảy nặng). Mục tiêu là đưa pH về 7.2, không đưa về 7.4 ngay lập tức để tránh kiềm hóa quá mức.</li>
                        </ul>`;
            }
        } else if (ph > 7.45) {
            document.getElementById('rect-alk').classList.add('active-box');
            if (co2 < 35) {
                title = "KIỀM HÔ HẤP (Respiratory Alkalosis)";
                logic = "Cơ chế: Tăng thông khí phế nang quá mức làm giảm PaCO2 đột ngột. Thường gặp trong các trạng thái kích động, đau đớn, sốt cao hoặc thở máy sai thông số.";
                organs = renderDetailedOrgans(
                    "🧠 <b>Hệ Thần Kinh:</b> Kiềm máu làm giảm nồng độ CO2 trong máu não, dẫn đến co mạch não cực mạnh (giảm tới 30-40% lưu lượng máu não). Triệu chứng: chóng mặt, lú lẫn, ngất xỉu.",
                    "⚡ <b>Thần Kinh Cơ:</b> Kiềm máu làm tăng sự gắn kết của Canxi với Albumin, dẫn đến hạ Canxi ion hóa (Ca++) máu. Điều này làm tăng kích thích thần kinh cơ, gây ra các cơn <b>Tetany</b>, tê bì quanh miệng, dấu hiệu Chvostek và Trousseau dương tính.",
                    "🫀 <b>Hệ Tim Mạch:</b> Gây loạn nhịp nhĩ và thất. Ở bệnh nhân có bệnh mạch vành, sự co thắt mạch máu do kiềm có thể khởi phát cơn đau thắt ngực hoặc nhồi máu cơ tim.",
                    "🧪 <b>Chuyển Hóa:</b> Gây hạ Kali máu (K+ đi vào tế bào) và hạ Phosphate máu, làm giảm sản xuất ATP cho tế bào."
                );
                treat = `<h3>💡 Phác Đồ Xử Trí & Lưu Ý Dược Lý</h3>
                        <ul>
                            <li><b>Trấn an tâm lý:</b> Hướng dẫn bệnh nhân thở chậm. Phương pháp 'thở túi giấy' giúp bệnh nhân hít lại lượng CO2 vừa thở ra để cân bằng lại pH.</li>
                            <li><b>Điều chỉnh máy thở:</b> Giảm thể tích khí lưu thông (Vt) hoặc giảm tần số thở.</li>
                            <li><b>Bù điện giải:</b> Cân nhắc bù Canxi Gluconate nếu bệnh nhân có biểu hiện co quắp cơ rõ rệt.</li>
                        </ul>`;
            } else {
                title = "KIỀM CHUYỂN HÓA (Metabolic Alkalosis)";
                logic = "Cơ chế: Do mất acid (nôn mửa, hút dịch dạ dày) hoặc dùng lợi tiểu gây mất Clo và Kali. Thận không thể thải HCO3- dư thừa do thiếu dịch và Clo.";
                organs = renderDetailedOrgans(
                    "🫁 <b>Hệ Hô Hấp:</b> Cơ thể bù trừ bằng cách ức chế trung tâm hô hấp, gây thở chậm và nông để giữ CO2. Điều này cực kỳ nguy hiểm vì có thể dẫn đến thiếu Oxy máu trầm trọng và xẹp phổi.",
                    "🫀 <b>Hệ Tim Mạch:</b> Kiềm máu nặng làm tăng độc tính của Digoxin trên tim và dễ gây các loại loạn nhịp tim khó điều trị do hạ Kali kèm theo.",
                    "🧬 <b>Hệ Thận:</b> Thông thường thận thải kiềm rất tốt. Nhưng khi thiếu Clo (Hypochloremia), thận bị bắt buộc phải tái hấp thu HCO3- để duy trì cân bằng điện tích, làm tình trạng kiềm kéo dài không tự hết được.",
                    "🧠 <b>Hệ Thần Kinh:</b> Thay đổi tri giác, ngủ gà, mệt mỏi và giảm ngưỡng co giật."
                );
                treat = `<h3>💡 Phác Đồ Xử Trí & Lưu Ý Dược Lý</h3>
                        <ul>
                            <li><b>Bù dịch - Clo là then chốt:</b> Truyền NaCl 0.9%. Chỉ khi cơ thể có đủ Clo, thận mới bắt đầu thải Bicarbonate ra nước tiểu.</li>
                            <li><b>Lợi tiểu:</b> Ngưng ngay Furosemide (Lợi tiểu quai) vì nó là thủ phạm chính gây mất Clo, H+ và K+. Nếu cần lợi tiểu cho bệnh nhân suy tim đang kiềm hóa, hãy dùng <b>Acetazolamide (Diamox)</b> để ép thận thải HCO3-.</li>
                            <li><b>Bù Kali:</b> Luôn dùng KCl để vừa bù Kali vừa bù Clo.</li>
                        </ul>`;
            }
        }

        document.getElementById('main-diag').innerText = title;
        document.getElementById('sub-logic').innerText = logic;
        document.getElementById('organ-lecture').innerHTML = organs;
        document.getElementById('treatment-gold').innerHTML = treat;
    }

    function renderDetailedOrgans(n, t, h, d) {
        return `<div class="lecture-card"><h4>🧠 THẦN KINH</h4><p>${n}</p></div>
                <div class="lecture-card"><h4>🫀 TIM MẠCH</h4><p>${t}</p></div>
                <div class="lecture-card"><h4>🫁 HÔ HẤP</h4><p>${h}</p></div>
                <div class="lecture-card"><h4>🧬 CHUYỂN HÓA & THẬN</h4><p>${d}</p></div>`;
    }
</script>
</body>
</html>
