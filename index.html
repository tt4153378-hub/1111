<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABG Expert - Phân Tích Hệ Thống</title>
    <style>
        :root { --primary: #0056b3; --danger: #d32f2f; --warn: #ff9800; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: #666; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #004494; }

        /* Sơ đồ thuần CSS */
        #diagram-area { margin: 20px 0; display: none; text-align: center; }
        .flow-svg { max-width: 100%; height: auto; background: #fff; border: 1px solid #eee; border-radius: 10px; }
        .node-rect { fill: #fff; stroke: #ccc; stroke-width: 2; }
        .node-text { font-size: 12px; font-weight: bold; fill: #333; }
        .active-node { fill: #fff3cd; stroke: var(--warn); stroke-width: 3; }

        .result-box { display: none; margin-top: 20px; }
        .diag-title { color: var(--danger); border-left: 5px solid var(--danger); padding-left: 15px; margin-bottom: 20px; }
        
        .organ-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .organ-card { padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 8px; }
        .organ-card h4 { margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .treatment-pro { background: #fff9e6; border: 1px solid #ffe0b2; padding: 20px; border-radius: 8px; margin-top: 20px; line-height: 1.7; }
        .treatment-pro h3 { color: #e65100; margin-top: 0; }
        .highlight { font-weight: bold; color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0">ABG CLINICAL MASTER</h1>
        <p style="margin:5px 0 0 0; opacity: 0.8;">Phân tích đa cơ quan & Phác đồ dược lý</p>
    </div>

    <div class="content">
        <div class="input-grid">
            <div><label>pH (7.35-7.45)</label><input type="number" id="ph" step="0.01" placeholder="7.40"></div>
            <div><label>PaCO2 (35-45)</label><input type="number" id="paco2" placeholder="40"></div>
            <div><label>HCO3- (22-26)</label><input type="number" id="hco3" placeholder="24"></div>
        </div>
        <button class="btn" onclick="processABG()">PHÂN TÍCH LÂM SÀNG CHUYÊN SÂU</button>

        <div id="diagram-area">
            <svg class="flow-svg" width="600" height="300" viewBox="0 0 600 300">
                <line x1="300" y1="50" x2="150" y2="120" stroke="#ccc" stroke-width="2" />
                <line x1="300" y1="50" x2="450" y2="120" stroke="#ccc" stroke-width="2" />
                <line x1="150" y1="120" x2="80" y2="200" stroke="#ccc" stroke-width="2" />
                <line x1="150" y1="120" x2="220" y2="200" stroke="#ccc" stroke-width="2" />
                <line x1="450" y1="120" x2="380" y2="200" stroke="#ccc" stroke-width="2" />
                <line x1="450" y1="120" x2="520" y2="200" stroke="#ccc" stroke-width="2" />

                <rect id="root" class="node-rect" x="240" y="20" width="120" height="40" rx="5" />
                <text x="300" y="45" text-anchor="middle" class="node-text">pH MÁU</text>

                <rect id="node-acid" class="node-rect" x="90" y="100" width="120" height="40" rx="5" />
                <text x="150" y="125" text-anchor="middle" class="node-text">TOAN (pH < 7.35)</text>

                <rect id="node-alk" class="node-rect" x="390" y="100" width="120" height="40" rx="5" />
                <text x="450" y="125" text-anchor="middle" class="node-text">KIỀM (pH > 7.45)</text>

                <rect id="node-ra" class="node-rect" x="20" y="190" width="120" height="40" rx="5" />
                <text x="80" y="215" text-anchor="middle" class="node-text" style="font-size:10px">TOAN HÔ HẤP</text>

                <rect id="node-ma" class="node-rect" x="160" y="190" width="120" height="40" rx="5" />
                <text x="220" y="215" text-anchor="middle" class="node-text" style="font-size:10px">TOAN CH.HÓA</text>

                <rect id="node-rk" class="node-rect" x="320" y="190" width="120" height="40" rx="5" />
                <text x="380" y="215" text-anchor="middle" class="node-text" style="font-size:10px">KIỀM HÔ HẤP</text>

                <rect id="node-mk" class="node-rect" x="460" y="190" width="120" height="40" rx="5" />
                <text x="520" y="215" text-anchor="middle" class="node-text" style="font-size:10px">KIỀM CH.HÓA</text>
            </svg>
        </div>

        <div class="result-box" id="result-box">
            <h2 class="diag-title" id="diag-res"></h2>
            
            <div class="organ-grid" id="organ-res"></div>

            <div class="treatment-pro" id="treat-res"></div>
        </div>
    </div>
</div>

<script>
    function processABG() {
        const ph = parseFloat(document.getElementById('ph').value);
        const co2 = parseFloat(document.getElementById('paco2').value);
        const hco3 = parseFloat(document.getElementById('hco3').value);

        if (isNaN(ph) || isNaN(co2) || isNaN(hco3)) { alert("Vui lòng nhập đủ các chỉ số!"); return; }

        document.getElementById('diagram-area').style.display = "block";
        document.getElementById('result-box').style.display = "block";
        
        // Reset nodes
        document.querySelectorAll('.node-rect').forEach(n => n.classList.remove('active-node'));
        document.getElementById('root').classList.add('active-node');

        let title = "", organs = "", treats = "";

        if (ph < 7.35) {
            document.getElementById('node-acid').classList.add('active-node');
            if (co2 > 45) {
                document.getElementById('node-ra').classList.add('active-node');
                title = "TOAN HÔ HẤP (Respiratory Acidosis)";
                organs = createOrganHtml("🧠 Não: Giãn mạch, tăng áp lực nội sọ.", "🫀 Tim: Giảm co bóp, dễ loạn nhịp.", "🫁 Phổi: Tăng công thở, mỏi cơ hô hấp.", "🧬 Thận: Tăng thải H+, giữ HCO3-.");
                treats = `<h3>🎯 Xử trí chuyên sâu:</h3>
                    <p>1. <b>Thông khí:</b> Ưu tiên BiPAP/NIV. Chỉ đặt nội khí quản nếu có rối loạn tri giác (GCS < 12).</p>
                    <p>2. <b>Dược lý:</b> Tuyệt đối <span class='highlight'>không bù Bicarbonate</span> vì sẽ làm tăng CO2 nội bào. Điều trị nguyên nhân gốc (giãn phế quản, hút đờm).</p>`;
            } else {
                document.getElementById('node-ma').classList.add('active-node');
                title = "TOAN CHUYỂN HÓA (Metabolic Acidosis)";
                organs = createOrganHtml("🫀 Tim: pH < 7.1 gây giảm sức bóp cơ tim.", "🫁 Phổi: Thở Kussmaul (nhanh sâu) để bù.", "💪 Cơ: Đau mỏi do tích tụ lactate.", "🩸 Máu: Tăng Kali (K+) do H+ đẩy K+ ra ngoài.");
                treats = `<h3>🎯 Xử trí chuyên sâu:</h3>
                    <p>1. <b>Điều trị gốc:</b> Truyền dịch trong Sốc, Insulin trong DKA, Lọc máu trong Suy thận.</p>
                    <p>2. <b>Bù Kali:</b> <span class='highlight'>Cực kỳ quan trọng!</span> Khi pH cải thiện, K+ sẽ lao vào tế bào. Phải bù Kali sớm để tránh ngưng tim do hạ Kali máu.</p>
                    <p>3. <b>Bicarbonate:</b> Chỉ cân nhắc khi pH < 7.1 hoặc mất kiềm trực tiếp (tiêu chảy).</p>`;
            }
        } else if (ph > 7.45) {
            document.getElementById('node-alk').classList.add('active-node');
            if (co2 < 35) {
                document.getElementById('node-rk').classList.add('active-node');
                title = "KIỀM HÔ HẤP (Respiratory Alkalosis)";
                organs = createOrganHtml("🧠 Não: Co mạch não, gây chóng mặt, ngất.", "⚡ Thần kinh: Hạ Canxi (Ca++) ion hóa gây tê bì.", "🫀 Tim: Tăng nhịp tim, co thắt mạch vành.", "🧪 Máu: Giảm cung cấp Oxy cho mô.");
                treats = `<h3>🎯 Xử trí chuyên sâu:</h3>
                    <p>1. <b>Kiểm soát:</b> Trấn an tâm lý, giảm đau, hạ sốt. Nếu thở máy, hãy giảm tần số hoặc Vt.</p>
                    <p>2. <b>Điện giải:</b> Bù Magie và Canxi nếu có dấu hiệu co quắp tay chân (Tetany).</p>`;
            } else {
                document.getElementById('node-mk').classList.add('active-node');
                title = "KIỀM CHUYỂN HÓA (Metabolic Alkalosis)";
                organs = createOrganHtml("🫁 Phổi: Thở chậm để giữ CO2 (nguy cơ thiếu Oxy).", "🫀 Tim: Dễ loạn nhịp nhĩ/thất do hạ Kali.", "🧬 Thận: Giữ H+, thải bớt kiềm (nếu đủ Clo).", "🧠 Não: Lú lẫn, giảm ngưỡng co giật.");
                treats = `<h3>🎯 Xử trí chuyên sâu:</h3>
                    <p>1. <b>Ngừng lợi tiểu:</b> Ngừng ngay Furosemide vì nó gây mất Clo và H+ làm kiềm nặng hơn.</p>
                    <p>2. <b>Bù dịch:</b> Truyền <span class='highlight'>NaCl 0.9%</span> (cung cấp Clo) là chìa khóa để thận thải Bicarbonate dư thừa.</p>
                    <p>3. <b>Thuốc:</b> Cân nhắc Acetazolamide (Diamox) để thải kiềm qua thận nếu quá tải dịch.</p>`;
            }
        } else {
            title = "CHỈ SỐ TRONG GIỚI HẠN BÌNH THƯỜNG";
            organs = "<p>Chưa phát hiện rối loạn cấp tính. Tiếp tục theo dõi lâm sàng.</p>";
            treats = "";
        }

        document.getElementById('diag-res').innerText = title;
        document.getElementById('organ-res').innerHTML = organs;
        document.getElementById('treat-res').innerHTML = treats;
    }

    function createOrganHtml(b, h, l, k) {
        return `<div class='organ-card'><h4>🧠 HỆ THẦN KINH</h4>${b}</div>
                <div class='organ-card'><h4>🫀 HỆ TIM MẠCH</h4>${h}</div>
                <div class='organ-card'><h4>🫁 HỆ HÔ HẤP</h4>${l}</div>
                <div class='organ-card'><h4>🧬 THẬN & MÁU</h4>${k}</div>`;
    }
</script>

</body>
</html>
